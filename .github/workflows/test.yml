name: Test
on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:

  test-user-creds:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: Run action
        uses: MetOffice/action-setup-artifactory@main
        with:
          username: ${{ secrets.art_user }}
          api-key: ${{ secrets.art_key }}
      - name: Setup Python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6
        with:
          python-version: "3.12"
      - name: Install Package
        run: pip install cloudteam-pythontools

  test-with-check-creds:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: Run action
        uses: MetOffice/action-setup-artifactory@main
        with:
          username: ${{ secrets.art_user }}
          api-key: ${{ secrets.art_key }}
          check-creds: true
      - name: Setup Python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6
        with:
          python-version: "3.12"
      - name: Install Package
        run: pip install cloudteam-pythontools

  test-no-username:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: Run action
        uses: MetOffice/action-setup-artifactory@main
        with:
          api-key: ${{ secrets.art_access_token }}
          check-creds: true
          setup-conda-forge: true

      - name: Assert netrc looks correct
        shell: bash
        run: |
          if (( $(cat ~/.netrc | wc -l) != 2 )); then
            echo "Wrong number of lines in .netrc file!";
            exit 1
          fi

          if grep "\<login\>" ~/.netrc; then
            echo "Unexpected 'login' entry found in ~/.netrc file."
            exit 1;
          fi

          if ! grep -e "machine metoffice.jfrog.io" ~/.netrc; then
            echo "Missing correct 'machine' field from ~/.netrc file."
          fi

          if ! grep -e "\<password\> *${{ secrets.ART_ACCESS_TOKEN }}" ~/.netrc; then
            echo "Missing correct 'password' field from ~/.netrc file."
          fi

      - name: Install conda package
        shell: bash
        run: |
          conda create -n test-env --no-deps zlib
          conda list -n test-env --explicit

  test-conda-forge:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: Add 'defaults' and conda-mo-internal channels to conda config
        shell: bash
        run: |
          conda config --add channels conda-main
          conda config --add channels conda-free
          conda config --add channels conda-r
          conda config --add channels defaults
          conda config --add channels conda-mo-internal
          conda config --show channels

      - name: Run action
        uses: MetOffice/action-setup-artifactory@main
        with:
          username: ${{ secrets.art_user }}
          api-key: ${{ secrets.art_key }}
          setup-conda-forge: true

      - name: Assert netrc looks correct
        shell: bash
        run: |
          DEFAULT_CHANNELS="conda-main conda-free conda-r defaults"
          EXPECTED_CHANNELS="conda-forge conda-mo-internal"

          CHANNELS=$(conda config --show channels --json | jq -r '.channels[]')

          echo "[INFO] Conda channels list:"
          echo "${CHANNELS}"
          echo "[INFO] ~/.condarc"
          cat ~/.condarc
          echo "[INFO] conda config sources:"  
          conda config --show-sources        

          # Check default channels have been removed:
          for DEFAULT in ${DEFAULT_CHANNELS}; do
            if echo "${CHANNELS}" | grep -x -q "\<${DEFAULT}\>" ; then
                echo "[FAIL] Found unexpected default channel '${DEFAULT}' in conda channels list."
                exit 1
            fi
          done

          # check expected channels are still present:
          for EXPECTED in ${EXPECTED_CHANNELS}; do
            if ! echo "${CHANNELS}" | grep -x -q "\<${EXPECTED}\>" ; then
              echo "[FAIL] Missing '${EXPECTED}' channel in conda channel list."
              exit 1
            fi
          done

      - name: Setup Python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6
        with:
          python-version: "3.12"

      - name: Install Package
        run: pip install cloudteam-pythontools

  test-micromamba:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: Install micromamba
        uses: mamba-org/setup-micromamba@d7c9bd84e824b79d2af72a2d4196c7f4300d3476  # v3.0.0
        with:
          condarc: |
            channels:
              - conda-forge
              - conda-main
              - conda-free
              - conda-r
              - defaults
              - conda-mo-internal

      - name: Run action
        uses: MetOffice/action-setup-artifactory@main
        with:
          username: ${{ secrets.art_user }}
          api-key: ${{ secrets.art_key }}
          check-creds: true
          setup-conda-forge: true

      - name: Setup Python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6
        with:
          python-version: "3.12"

      - name: Show mamba config
        run: micromamba config list
        shell: bash

      - name: Install Package
        shell: bash
        run: micromamba create -n test-env --no-deps zlib