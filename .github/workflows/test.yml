name: Test
on:
  push:
    branches:
      - main

jobs:
  test-no-default:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    env:
      ART_USER: ${{ secrets.art_user }}
      ART_KEY: ${{ secrets.art_key }}
    steps:
      - name: Run action
        uses: MetOffice/action-setup-artifactory@main
        with:
          username: $ART_USER
          api-key: $ART_KEY
          setup-conda-forge: true

      - name: Setup Python
        uses: actions/setup-python@v2
        with:
          python-version: "3.8"

      - name: Install Package
        run: pip install cloudteam-pythontools

  test-use-defaults:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    env:
      ART_USER: ${{ secrets.art_user }}
      ART_KEY: ${{ secrets.art_key }}
    steps:
      - name: Run action
        uses: MetOffice/action-setup-artifactory@main

      - name: Setup Python
        uses: actions/setup-python@v2
        with:
          python-version: "3.8"

      - name: Install Package
        run: pip install cloudteam-pythontools
