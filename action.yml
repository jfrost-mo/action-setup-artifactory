name: Setup Artifactory
description: GitHub Action to configure Conda and pip to use Met Office Artifactory.
author: Payton Leedham
inputs:
  username:
    description: Artifactory username
    required: false  # Note `required` doesn't actually do anything: https://github.com/actions/runner/issues/1070

  api-key:
    description: Artifactory API key
    required: true

  check-creds:
    description: Optional check credentials status
    required: true
    default: false

  setup-conda-forge:
    description: Add conda-forge as a channel in preference to Anaconda defaults
    required: false
    default: false

runs:
  using: "composite"
  steps:

    - name: Get condarc locations
      shell: bash
      run: |
        SOURCES=""
        if [ command -v conda >/dev/null 2>&1 ]; then
          SOURCES="${SOURCES} $(conda config --show-sources --json | jq -r 'keys[]')"
        fi

        if [ -n "${MAMBA_EXE}" ]; then
          # not as clean as Conda output, not JSON option:
          SOURCES="${SOURCES} $(${MAMBA_EXE} config sources | tail -n+2)"
        fi

        # Also add user ~/.condarc, if it exists:
        if [ -f ${HOME}/.condarc ]; then
          SOURCES="${SOURCES} ${HOME}/.condarc"
        fi

        echo "The following condarc sources will be updated:"
        echo "${SOURCES}"

        echo "CONDARC_SOURCES=${SOURCES}" >> $GITHUB_ENV

    - name: Create netrc file
      shell: bash
      run: |
        echo "machine metoffice.jfrog.io" >> ~/.netrc
        # If username is empty don't add login entry to .netrc (assumes Access Token):
        if [[ -s "${{ inputs.username }}" ]]; then
          echo "  login ${{ inputs.username }}" >> ~/.netrc
        fi
        echo "  password ${{ inputs.api-key }}" >> ~/.netrc

    - name: Add the conda channel_alias for Artifactory
      shell: bash
      run: |

        CHANNEL_ALIAS_STR="channel_alias: https://metoffice.jfrog.io/metoffice/api/conda"
        for CONDARC_FILE in ${CONDARC_SOURCES}; do
          if grep "^channel_alias" ${CONDARC_FILE} 2>/dev/null; then
            echo "INFO: channel_alias already present in ${CONDARC_FILE}"
          else
            echo "INFO: Adding channel_alias to ${CONDARC_FILE}"
            echo ${CHANNEL_ALIAS_STR} >> ${CONDARC_FILE}
          fi
        done

    - name: Configure conda-forge channel
      if: ${{ inputs.setup-conda-forge == 'true' }}
      shell: bash
      run: |
        DEFAULT_CHANNELS="conda-main conda-free conda-r defaults"

        for CONDARC_FILE in ${CONDARC_SOURCES}; do

          if [ ! -f "${CONDARC_FILE}" ]; then
            echo "INFO: ${CONDARC_FILE} does not exist, skipping..."
            continue
          fi

          # Add the conda-forge channel:
          if yq -e '.channels | index("conda-forge")' ${CONDARC_FILE} >/dev/null 2>&1; then
            echo "INFO: conda-forge channel already present in ${CONDARC_FILE}"
          else
            echo "INFO: Adding conda-forge channel to ${CONDARC_FILE}"
            yq -i -Y '.channels = ["conda-forge"] + .channels' ${CONDARC_FILE}
          fi

          # remove any of the defaults channels from the config file:
          for DEFAULT in ${DEFAULT_CHANNELS}; do
            if yq -e --arg DEFAULT "${DEFAULT}" '.channels | index($DEFAULT)' ${CONDARC_FILE} >/dev/null 2>&1; then
              echo "INFO: Removing default channel ${DEFAULT} from ${CONDARC_FILE}"
              yq -i -Y --arg DEFAULT "${DEFAULT}" '.channels |= map(select(. != $DEFAULT))' ${CONDARC_FILE}
            fi
          done
        done

    - name: Create pip configuration file
      shell: bash
      run: |
        mkdir -p ~/.config/pip
        cat << EOF > ~/.config/pip/pip.conf
        [global]
        index-url = https://metoffice.jfrog.io/metoffice/api/pypi/pypi/simple
        trusted-host = metoffice.jfrog.io
        EOF

    - name: Check Artifactory authentication
      shell: bash
      if: ${{ inputs.check-creds == 'true' }}
      run: |
        echo "Testing authentication to Artifactory"
        # Check  and capture numerical status code
        url="https://metoffice.jfrog.io/metoffice/api/conda/conda-forge"
        status=$(curl -n -I --write-out %{http_code} --silent --output /dev/null ${url}) 
        echo "MO JFrog Artifactory returned: ${status}"
        # if connection and authentication work, then expect a 200 code
        if [ $status != "200" ]; then
        # connection or authentication problems
        echo "Check authentication file, password expiry or user settings"
        exit 1
        else
        echo "Server returned: ${status}"
        echo "Artifactory connection ok, continuing"
        fi
